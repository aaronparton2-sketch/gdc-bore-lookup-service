services:
  - type: web
    name: gdc-bore-lookup
    env: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: LOOKUP_API_KEY
        sync: false   # set in Render dashboard, NOT in repo
      - key: PYTHON_VERSION
        value: 3.11.10
